name: media-env
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip==24.0
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8
  - pip:
      - "setuptools<70.0.0"
      - mlflow==2.22.2
      # Medical Imaging & Deep Learning
      - monai
      - einops
      - nibabel
      - itk
      - SimpleITK
      # Data Science stack
      - numpy
      - pandas
      - scipy
      - scikit-image
      - matplotlib
      - tqdm
      - psutil
      - nvidia-ml-py
      - omegaconf