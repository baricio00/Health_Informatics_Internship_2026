$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: Myocardium SegResNet Training
description: >
  Trains a MONAI SegResNet on the LEMS-CT-NIfTI dataset.
  Validation records raw and LCC-postprocessed metrics; checkpoint selection
  uses the deployed LCC-postprocessed Dice score.
experiment_name: myocardium_segmentation_job
compute: azureml:clusterprdwe-vzhst6

environment: azureml:media-env:8

environment_variables:
  PYTHONPATH: .

inputs:
  input_data:
    type: uri_folder
    path: azureml:LEMS-CT-NIfTI:1
    mode: ro_mount
  fold: 0

  # To fine-tune or resume, uncomment this block and replace the path.
  # checkpoint_file:
  #   type: uri_file
  #   path: azureml://datastores/73da10b45dff54e2db0d3a1fab882485/paths/output/models/latest_checkpoint.pth
  #   mode: ro_mount

outputs:
  output_model:
    type: uri_folder

code: ../
command: >
  python scripts/train_job.py
  --input_data ${{inputs.input_data}}
  --output_model ${{outputs.output_model}}
  --split_csv data/cv_splits.csv
  --fold ${{inputs.fold}}
  --config config/train_config.yaml

resources:
  instance_count: 1
